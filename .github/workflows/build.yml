name: Compilar APK Android

on:
  push:
    branches:
      - Dev.-Alejandro
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            openjdk-17-jdk build-essential \
            libltdl-dev ccache

      - name: Instalar Buildozer y Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.37 virtualenv

      - name: Cachear archivos de Buildozer (.buildozer)
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Cachear SDK y NDK de Android
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: android-sdk-ndk-${{ runner.os }}-api33-ndk25
          restore-keys: |
            android-sdk-ndk-${{ runner.os }}-

      - name: Compilar APK
        run: yes | buildozer -v android debug

      - name: Subir APK final
        uses: actions/upload-artifact@v4
        with:
          name: LabubuCalc-APK
          path: ./bin/*.apk
