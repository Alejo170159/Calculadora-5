name: Compilar APK Android

on:
  push:
    branches:
      - Dev.-Alejandro
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependencias del sistema y Buildozer
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev openjdk-17-jdk
          pip install buildozer cython virtualenv

      - name: Compilar APK
        run: yes | buildozer -v android debug

      - name: Subir APK final
        uses: actions/upload-artifact@v4
        with:
          name: LabubuCalc-APK
          path: ./bin/*.apk
